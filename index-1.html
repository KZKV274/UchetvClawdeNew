<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Склад" />
  <title>BRIDGE FULFILLMENT — Склад</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <header class="topbar">
      <div class="topbar-brand">
        <span class="brand-icon">📦</span>
        <div class="brand-text">
          <span class="brand-name">BRIDGE FULFILLMENT</span>
          <span class="brand-sub">Учёт работы</span>
        </div>
      </div>
      <div class="topbar-meta" id="topbar-meta">0 зап</div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="add"><span class="tab-icon">✚</span><span class="tab-label">Добавить</span></button>
      <button class="tab" data-tab="history"><span class="tab-icon">☰</span><span class="tab-label">История</span></button>
      <button class="tab" data-tab="stats"><span class="tab-icon">◈</span><span class="tab-label">Статистика</span></button>
      <button class="tab" data-tab="motivation"><span class="tab-icon">🏆</span><span class="tab-label">Рейтинг</span></button>
      <button class="tab" data-tab="settings"><span class="tab-icon">⚙</span><span class="tab-label">Настройки</span></button>
    </nav>

    <main class="screens">

      <!-- ADD -->
      <section class="screen active" id="screen-add">
        <div id="employee-widget" class="employee-widget hidden"></div>
        <div id="top3-widget" class="top3-widget hidden"></div>

        <div class="form-card">
          <div class="form-group">
            <label class="form-label">Сотрудник</label>
            <div class="select-add-row">
              <select id="f-employee" class="form-control"></select>
              <button class="btn-icon" id="btn-add-employee">＋</button>
            </div>
          </div>

          <div id="goal-progress-wrap" class="goal-progress-wrap hidden">
            <div class="goal-progress-header">
              <span id="goal-progress-label">Цель на сегодня</span>
              <span id="goal-progress-pct">0%</span>
            </div>
            <div class="goal-progress-track">
              <div class="goal-progress-fill" id="goal-progress-fill"></div>
            </div>
            <div class="goal-progress-sub" id="goal-progress-sub"></div>
          </div>

          <div class="form-group">
            <label class="form-label">Модель</label>
            <div class="select-add-row">
              <select id="f-model" class="form-control"></select>
              <button class="btn-icon" id="btn-add-model">＋</button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Цвет</label>
            <input type="text" id="f-color" class="form-control" placeholder="Введите цвет…" autocomplete="off" />
            <div class="quick-btns" id="quick-colors"></div>
          </div>

          <div class="form-group">
            <label class="form-label">Размер</label>
            <input type="text" id="f-size" class="form-control" placeholder="Введите размер…" autocomplete="off" />
            <div class="quick-btns" id="quick-sizes"></div>
          </div>

          <div class="form-group">
            <label class="form-label">Количество</label>
            <input type="number" id="f-qty" class="form-control" placeholder="0" min="1" inputmode="numeric" />
          </div>

          <div class="form-group">
            <label class="form-label">Комментарий <span class="optional">необязательно</span></label>
            <input type="text" id="f-note" class="form-control" placeholder="Заметка…" autocomplete="off" />
          </div>

          <div class="form-actions">
            <button class="btn btn-primary" id="btn-save">Сохранить</button>
            <button class="btn btn-ghost" id="btn-clear">Очистить</button>
          </div>
        </div>
        <div class="toast-area" id="toast"></div>
      </section>

      <!-- HISTORY -->
      <section class="screen" id="screen-history">
        <div class="history-controls">
          <input type="text" id="h-search" class="form-control" placeholder="🔍 Поиск по всем полям…" />
          <div class="filter-row">
            <select id="h-filter-emp" class="form-control filter-select"><option value="">Все сотрудники</option></select>
            <select id="h-filter-model" class="form-control filter-select"><option value="">Все модели</option></select>
            <select id="h-filter-size" class="form-control filter-select"><option value="">Все размеры</option></select>
          </div>
          <div class="filter-row">
            <input type="date" id="h-date-from" class="form-control filter-select" />
            <input type="date" id="h-date-to" class="form-control filter-select" />
            <button class="btn btn-ghost" id="btn-reset-filters" style="white-space:nowrap">Сбросить</button>
          </div>
        </div>
        <div class="history-summary" id="history-summary"></div>
        <div class="export-row">
          <button class="btn btn-ghost btn-sm" id="btn-export-csv">CSV</button>
          <button class="btn btn-ghost btn-sm" id="btn-export-json">JSON</button>
          <label class="btn btn-ghost btn-sm" style="cursor:pointer">Импорт JSON<input type="file" id="import-json" accept=".json" style="display:none" /></label>
        </div>
        <div id="history-list" class="history-list"></div>
      </section>

      <!-- STATS -->
      <section class="screen" id="screen-stats">
        <div class="period-tabs">
          <button class="period-btn active" data-period="today">Сегодня</button>
          <button class="period-btn" data-period="week">Неделя</button>
          <button class="period-btn" data-period="month">Месяц</button>
          <button class="period-btn" data-period="all">Всё</button>
        </div>
        <div id="stats-content"></div>
      </section>

      <!-- MOTIVATION -->
      <section class="screen" id="screen-motivation">
        <div id="motivation-content"></div>
      </section>

      <!-- SETTINGS -->
      <section class="screen" id="screen-settings">
        <div class="settings-block">
          <h3 class="settings-title">🎯 Дневные цели</h3>
          <p class="settings-hint">Норма штук в день на сотрудника</p>
          <div id="goals-editor"></div>
        </div>
        <div class="settings-block">
          <h3 class="settings-title">Быстрые цвета</h3>
          <div class="tag-editor" id="colors-editor"></div>
          <div class="tag-add-row">
            <input type="text" id="new-color" class="form-control" placeholder="Добавить цвет…" />
            <button class="btn btn-primary btn-sm" id="btn-add-color">＋</button>
          </div>
        </div>
        <div class="settings-block">
          <h3 class="settings-title">Быстрые размеры</h3>
          <div class="tag-editor" id="sizes-editor"></div>
          <div class="tag-add-row">
            <input type="text" id="new-size" class="form-control" placeholder="Добавить размер…" />
            <button class="btn btn-primary btn-sm" id="btn-add-size">＋</button>
          </div>
        </div>
        <div class="settings-block">
          <h3 class="settings-title">Сотрудники</h3>
          <div class="tag-editor" id="employees-editor"></div>
          <div class="tag-add-row">
            <input type="text" id="new-employee" class="form-control" placeholder="Добавить сотрудника…" />
            <button class="btn btn-primary btn-sm" id="btn-add-employee-s">＋</button>
          </div>
        </div>
        <div class="settings-block">
          <h3 class="settings-title">Модели</h3>
          <div class="tag-editor" id="models-editor"></div>
          <div class="tag-add-row">
            <input type="text" id="new-model" class="form-control" placeholder="Добавить модель…" />
            <button class="btn btn-primary btn-sm" id="btn-add-model-s">＋</button>
          </div>
        </div>
        <div class="settings-block danger-zone">
          <h3 class="settings-title">Опасная зона</h3>
          <button class="btn btn-danger" id="btn-clear-all">Удалить все записи</button>
        </div>
      </section>

    </main>
  </div>

  <canvas id="confetti-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:9999;width:100%;height:100%"></canvas>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-title" id="modal-title"></div>
      <input type="text" id="modal-input" class="form-control" />
      <div class="modal-actions">
        <button class="btn btn-primary" id="modal-ok">Добавить</button>
        <button class="btn btn-ghost" id="modal-cancel">Отмена</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
